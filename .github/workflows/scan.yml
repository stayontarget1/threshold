name: THRESHOLD scan

on:
  schedule:
    - cron: "0 * * * *"   # top of every hour (UTC). It's cheap — see README.
  workflow_dispatch: {}     # lets you run it manually from the Actions tab

permissions:
  contents: write           # allow the job to commit updated data/feed.json

concurrency:
  group: threshold-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r scripts/requirements.txt

      - name: Run the judge
        env:
          JUDGE_PROVIDER: ${{ vars.JUDGE_PROVIDER || 'anthropic' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/judge.py

      - name: Commit results if changed
        run: |
          git config user.name "threshold-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/feed.json data/seen.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "scan: update feed $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
