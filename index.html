<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>THRESHOLD</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="brand">
      <h1>THRESHOLD</h1>
      <p class="tagline">It stays quiet unless something crossed the line.</p>
    </div>
    <div class="status">
      <span id="updated">last scan: —</span>
      <div class="filters" id="filters">
        <button data-tier="all" class="active">ALL</button>
        <button data-tier="S">S</button>
        <button data-tier="A">A</button>
        <button data-tier="B">B</button>
      </div>
    </div>
  </header>

  <main id="feed">
    <div class="loading">reading the wire…</div>
  </main>

  <footer>
    <span id="count"></span>
    <span class="legend">
      <b class="tier-S">S</b> drop everything
      &nbsp;·&nbsp; <b class="tier-A">A</b> clear &amp; broad
      &nbsp;·&nbsp; <b class="tier-B">B</b> on the radar
    </span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
